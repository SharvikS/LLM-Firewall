version: '3.8'

services:
  # --------------------------------------------------------
  # OBSERVABILITY V2 PLATFORM (TITAN MODE)
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: titan-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.1.5
    container_name: titan-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=titan_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.1
    container_name: titan-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.2.2
    container_name: titan-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "14268:14268"  # jaeger ingest
      - "3200:3200"    # tempo
      - "4317:4317"    # otlp grpc
      - "4318:4318"    # otlp http

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.85.0
    container_name: titan-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317"         # OTLP gRPC receiver
      - "4318"         # OTLP HTTP receiver
    depends_on:
      - tempo
      - prometheus
      - loki
