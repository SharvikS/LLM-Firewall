version: '3.8'

services:
  # --------------------------------------------------------
  # EVENT STREAMING PLATFORM
  # --------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: titan-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:28082,external://localhost:8082
    ports:
      - "8081:8081"
      - "8082:8082"
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console for Observability
  console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: titan-redpanda-console
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  # --------------------------------------------------------
  # OLTP DATABASE (POLICIES, USERS, TENANTS)
  # --------------------------------------------------------
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.10
    container_name: titan-cockroachdb
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8081:8080" # Avoid port conflict with Redpanda API
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # OLAP DATABASE (SECURITY ANALYTICS, AUDIT LOGS)
  # --------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: titan-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=audit_logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # VECTOR DATABASE (SEMANTIC CACHING)
  # --------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: titan-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  redpanda_data:
  cockroach_data:
  clickhouse_data:
  qdrant_data:
