apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: titan-global-gateway
  namespace: llm-firewall
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: titan-tls-cert
    hosts:
    - "api.cyberfort.ai"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: titan-routing
  namespace: llm-firewall
spec:
  hosts:
  - "api.cyberfort.ai"
  gateways:
  - titan-global-gateway
  http:
  - match:
    - uri:
        prefix: /v1/chat/completions
    route:
    - destination:
        host: titan-gateway.llm-firewall.svc.cluster.local
        port:
          number: 80
