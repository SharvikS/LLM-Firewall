# TLS overlay for the gateway↔ML-engine gRPC channel.
#
#   1. ./scripts/gen-certs.sh
#   2. docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d --build
#
# Encrypts the analyzer gRPC channel end-to-end. The same self-signed cert is
# the ML engine's server cert and the CA the gateway trusts; its SAN includes
# "ml_engine" so client-side verification against ANALYZER_ADDR succeeds. The ML
# server refuses to start on plaintext once GRPC_TLS_ENABLED=true, so a missing
# or unreadable cert fails closed rather than silently downgrading.
services:
  ml_engine:
    environment:
      GRPC_TLS_ENABLED: "true"
      GRPC_TLS_CERT: "/etc/certs/tls.crt"
      GRPC_TLS_KEY: "/etc/certs/tls.key"
    volumes:
      - ./certs:/etc/certs:ro
    healthcheck:
      # The gRPC port now requires TLS, so the plaintext grpc.insecure_channel
      # probe no longer works — check the embed HTTP /health endpoint instead.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gateway:
    environment:
      ANALYZER_TLS_ENABLED: "true"
      ANALYZER_TLS_CERT_FILE: "/etc/certs/tls.crt"
    volumes:
      - ./certs:/etc/certs:ro
