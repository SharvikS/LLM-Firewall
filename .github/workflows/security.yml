name: security-scan

# Dependency / CVE scan across all three components. Runs on every push and PR,
# plus weekly so newly-disclosed CVEs in pinned deps surface without a code change.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
        working-directory: gateway

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      # CVE-2025-3000 is a torch advisory with NO patched release available, so it
      # can't be fixed by upgrading. It's explicitly acknowledged here so the gate
      # still fails on any NEW or fixable vulnerability. Re-review when torch ships
      # a fix and remove this ignore. (Reviewed 2026-06-14.)
      - run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-3000
        working-directory: ml_engine

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: dashboard
      # Fail only on high+ severity so moderate advisories don't block merges.
      - run: npm audit --audit-level=high
        working-directory: dashboard
