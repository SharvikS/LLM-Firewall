name: titan-llm-firewall

# ─────────────────────────────────────────────────────────────────────────────
# Unified Titan LLM Firewall stack.
#
# Service map:
#   gateway      – Go reverse proxy (port 8080)
#   ml_engine    – Python gRPC analyzer (port 50051)
#   dashboard    – Next.js control plane (port 3000)
#   redis        – Rate limiting + semantic cache (port 6379)
#   cockroachdb  – Policy/key storage, Postgres-wire compatible (port 26257)
#   redpanda     – Kafka-wire event bus (port 9092)
#   console      – Redpanda web UI (port 8082)
#
# Start everything:   docker compose up -d
# Gateway only:       docker compose up -d gateway redis
# Rebuild images:     docker compose build --no-cache
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── CockroachDB (single-node, Postgres-wire, locality-tagged) ───────────────
  # Locality flags expose region/zone metadata in CRDB's built-in dashboards and
  # prepare the schema for a future 3-node multi-region topology without any
  # application-layer changes. True REGIONAL BY ROW geo-partitioning requires an
  # enterprise licence and bare-metal; this single-node config is local-dev safe.
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.10
    command: >
      start-single-node --insecure
      --locality=region=local,zone=local-a
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    ports:
      - "26257:26257"
      - "8081:8080"   # Admin UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redpanda (Kafka-wire event bus) ───────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.2.19
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:8083
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:8083
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:8084
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "9092:9092"
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    mem_limit: 1g

  # ── Redpanda Console ──────────────────────────────────────────────────────
  console:
    image: redpandadata/console:v2.3.1
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8082:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ── Qdrant (vector DB for semantic response caching) ─────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ML Engine (Python gRPC + embedding HTTP) ──────────────────────────────
  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    environment:
      GRPC_PORT: "50051"
      GRPC_WORKERS: "4"
      EMBED_PORT: "8001"
      EMBED_MODEL: "all-MiniLM-L6-v2"
    ports:
      - "50051:50051"
      - "8001:8001"   # embedding HTTP endpoint
    healthcheck:
      test: ["CMD", "python", "-c",
             "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s   # model loading takes ~10s
    restart: unless-stopped

  # ── Go Gateway ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file:
      - ./gateway/.env
    environment:
      LISTEN_ADDR: ":8080"
      TARGET_URL: "https://api.groq.com/openai"
      DB_CONN_STRING: "postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable"
      KAFKA_BROKERS: "redpanda:29092"
      REDIS_ADDR: "redis:6379"
      ANALYZER_ADDR: "ml_engine:50051"
      ANALYZER_TIMEOUT_MS: "150"
      RATE_LIMIT_RPM: "60"
      RATE_LIMIT_WINDOW_SEC: "60"
      RATE_LIMIT_TPM: "0"
      CACHE_TTL_SEC: "3600"
      MAX_REQUEST_BODY_BYTES: "4194304"
      QDRANT_URL: "http://qdrant:6333"
      EMBEDDING_URL: "http://ml_engine:8001/embed"
      SEMANTIC_CACHE_THRESHOLD: "0.95"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      cockroachdb:
        condition: service_healthy
      ml_engine:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Next.js Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_GATEWAY_URL: "http://gateway:8080"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-titan-admin-dev-secret}"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  cockroach_data:
  redpanda_data:
  qdrant_data:
