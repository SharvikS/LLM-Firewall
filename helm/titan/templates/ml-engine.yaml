apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titan.fullname" . }}-ml
  labels:
    app.kubernetes.io/name: titan-ml
    {{- include "titan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mlEngine.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: titan-ml
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: titan-ml
        {{- include "titan.labels" . | nindent 8 }}
      annotations:
        sidecar.istio.io/inject: {{ .Values.mlEngine.istioInject | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ml-engine
          image: {{ .Values.mlEngine.image }}
          ports:
            - containerPort: 50051   # gRPC analyzer
            - containerPort: 8001    # embedding HTTP
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: EMBED_PORT
              value: "8001"
            {{- range $k, $v := .Values.mlEngine.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket: {port: 50051}
            initialDelaySeconds: 20   # transformer model load
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: 50051}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources: {{- toYaml .Values.mlEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titan.fullname" . }}-ml
  labels: {{- include "titan.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: titan-ml
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - {name: grpc, protocol: TCP, port: 50051, targetPort: 50051}
    - {name: embed, protocol: TCP, port: 8001, targetPort: 8001}
