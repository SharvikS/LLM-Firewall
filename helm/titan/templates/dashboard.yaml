{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titan.fullname" . }}-dashboard
  labels:
    app.kubernetes.io/name: titan-dashboard
    {{- include "titan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: titan-dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: titan-dashboard
        {{- include "titan.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image }}
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "http://{{ include "titan.fullname" . }}-gateway:{{ .Values.gateway.service.port }}"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "titan.secretName" . }}
                  key: admin-token
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titan.fullname" . }}-dashboard
  labels: {{- include "titan.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    app.kubernetes.io/name: titan-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.dashboard.service.port }}
      targetPort: 3000
{{- end }}
