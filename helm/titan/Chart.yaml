apiVersion: v2
name: titan
description: >-
  TITAN Gateway — zero-trust LLM security gateway. Deploys the Go data plane,
  the Python ML analyzer and the Next.js dashboard. External state services
  (Redis, CockroachDB/PostgreSQL, Kafka/Redpanda, Qdrant, ClickHouse) are
  consumed via endpoints in values.yaml so each region can point at its own
  or a shared topology.
type: application
version: 0.1.0
appVersion: "2.0.0"
keywords: [llm, security, gateway, ai-firewall]
sources: [https://github.com/SharvikS/LLM-Firewall]
